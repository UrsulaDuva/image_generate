<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>图片反推 - 孔春春AI工坊</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  body { background: #f5f5f5; color: #333; font-family: Inter, sans-serif; }
  .font-headline { font-family: 'Space Grotesk', sans-serif; }
  .ghost-border { border: 1px solid rgba(0,0,0,0.08); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
  .drop-zone { transition: all .2s ease; }
  .drop-zone.dragover { border-color: #9333ea; background: #faf5ff; }
  .brand-logo { font-family:"Space Grotesk","Microsoft YaHei",sans-serif; font-weight:800; letter-spacing:.02em; background:linear-gradient(135deg,#7c3aed,#ec4899 48%,#06b6d4); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 8px 18px rgba(147,51,234,.18)); }
  textarea { resize: vertical; }
</style>
</head>
<body class="min-h-screen">
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-2xl shadow-[0_1px_0_0_rgba(0,0,0,0.1)] h-16 flex justify-between items-center gap-4 px-4 md:px-10">
  <div class="flex items-center gap-6 min-w-0 flex-1">
    <div class="brand-logo text-xl md:text-2xl shrink-0">孔春春AI工坊</div>
    <nav class="flex min-w-0 flex-1 gap-4 overflow-x-auto whitespace-nowrap font-headline tracking-tight">
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/">图像生成</a>
      <a class="text-purple-600 border-b-2 border-purple-600 pb-1 font-bold" href="/analyze">图片反推</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/video">视频生成</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/?tab=history">作品库</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/templates">提示词模板</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/chat?mode=chat">文案生成</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/chat/history?type=chat">文案历史</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/chat/history?type=agent">助手历史</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/profile">个人中心</a>
    </nav>
  </div>
  <a href="/api/logout" class="text-gray-500 hover:text-purple-600 text-sm flex items-center gap-1 shrink-0">
    <span class="material-symbols-outlined text-[16px]">logout</span> 退出
  </a>
</header>

<main class="pt-24 px-10 pb-12 max-w-7xl mx-auto">
  <div class="flex items-end justify-between gap-6 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-800 font-headline">图片反推</h1>
      <p class="text-sm text-gray-500 mt-1">上传图片，调用 Qwen 反推出可用于生图的提示词。</p>
    </div>
    <div id="status" class="text-sm text-gray-500">模型: qwen3.6-plus</div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-[420px_1fr] gap-6">
    <section class="bg-white rounded-2xl ghost-border p-5 h-fit">
      <h2 class="font-headline font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-purple-600">add_photo_alternate</span>
        输入图片
      </h2>
      <div id="drop-zone" class="drop-zone ghost-border rounded-2xl bg-gray-50 min-h-[300px] flex items-center justify-center text-center cursor-pointer overflow-hidden">
        <div id="placeholder" class="px-8 text-gray-400">
          <span class="material-symbols-outlined text-6xl text-gray-300 block mb-3">upload</span>
          <div class="font-medium text-gray-500">点击或拖拽上传图片</div>
          <div class="text-xs mt-1">PNG / JPEG / WebP，最大 8MB</div>
        </div>
        <img id="preview" class="hidden w-full h-full object-contain max-h-[420px] bg-gray-50" alt="预览图"/>
      </div>
      <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp" class="hidden"/>

      <label class="block mt-5 text-sm font-semibold text-gray-700 mb-2">反推要求</label>
      <textarea id="instruction" rows="5" class="w-full ghost-border rounded-2xl px-4 py-3 outline-none focus:border-purple-400 text-sm" placeholder="默认会输出画面描述、中文提示词、英文提示词和关键词。也可以写：重点反推成小红书风格提示词、保留人物姿态等。"></textarea>

      <div class="flex gap-3 mt-4">
        <button id="btn-clear" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-2xl font-semibold flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">delete</span> 清除
        </button>
        <button id="btn-analyze" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-2xl font-semibold flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="material-symbols-outlined">auto_awesome</span> 开始反推
        </button>
      </div>
    </section>

    <section class="bg-white rounded-2xl ghost-border p-5 min-h-[620px] flex flex-col">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-headline font-semibold text-gray-800 flex items-center gap-2">
          <span class="material-symbols-outlined text-cyan-600">description</span>
          反推结果
        </h2>
        <div id="meta" class="text-xs text-gray-400">等待上传</div>
      </div>
      <textarea id="result" class="flex-1 min-h-[480px] bg-gray-50 ghost-border rounded-2xl p-4 text-sm leading-relaxed outline-none focus:border-purple-400" placeholder="结果会显示在这里，可复制或带回图像生成页。"></textarea>
      <div class="flex flex-wrap gap-3 mt-4">
        <button id="btn-copy" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2.5 rounded-2xl font-semibold flex items-center gap-2">
          <span class="material-symbols-outlined">content_copy</span> 复制结果
        </button>
        <button id="btn-use" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-2xl font-semibold flex items-center gap-2">
          <span class="material-symbols-outlined">image</span> 用于图像生成
        </button>
      </div>
    </section>
  </div>
</main>

<script>
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const placeholder = document.getElementById('placeholder');
const preview = document.getElementById('preview');
const btnAnalyze = document.getElementById('btn-analyze');
const btnClear = document.getElementById('btn-clear');
const resultEl = document.getElementById('result');
const metaEl = document.getElementById('meta');
const statusEl = document.getElementById('status');
let selectedFile = null;

function setFile(file) {
  if (!file) return;
  if (!['image/png', 'image/jpeg', 'image/webp'].includes(file.type)) {
    alert('仅支持 PNG/JPEG/WebP 图片');
    return;
  }
  if (file.size > 8 * 1024 * 1024) {
    alert('图片不能超过 8MB');
    return;
  }
  selectedFile = file;
  preview.src = URL.createObjectURL(file);
  preview.classList.remove('hidden');
  placeholder.classList.add('hidden');
  metaEl.textContent = `${file.name} · ${(file.size / 1024 / 1024).toFixed(2)} MB`;
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => setFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  setFile(e.dataTransfer.files[0]);
});

btnClear.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  preview.src = '';
  preview.classList.add('hidden');
  placeholder.classList.remove('hidden');
  resultEl.value = '';
  metaEl.textContent = '等待上传';
});

btnAnalyze.addEventListener('click', async () => {
  if (!selectedFile) {
    alert('请先上传图片');
    return;
  }
  btnAnalyze.disabled = true;
  statusEl.textContent = '分析中...';
  resultEl.value = '';
  const formData = new FormData();
  formData.append('file', selectedFile);
  formData.append('instruction', document.getElementById('instruction').value.trim());
  const started = Date.now();
  try {
    const res = await fetch('/api/analyze-image', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok || !data.success) {
      throw new Error(data.detail || data.message || '反推失败');
    }
    resultEl.value = data.content || '';
    const elapsed = data.elapsed_seconds || ((Date.now() - started) / 1000).toFixed(1);
    metaEl.textContent = `${data.model || 'qwen3.6-plus'} · ${elapsed}s`;
    statusEl.textContent = '完成';
  } catch (e) {
    resultEl.value = '反推失败：' + e.message;
    statusEl.textContent = '出错';
  } finally {
    btnAnalyze.disabled = false;
  }
});

document.getElementById('btn-copy').addEventListener('click', async () => {
  const text = resultEl.value.trim();
  if (!text) return alert('暂无结果可复制');
  await navigator.clipboard.writeText(text);
  alert('已复制');
});

document.getElementById('btn-use').addEventListener('click', () => {
  const text = resultEl.value.trim();
  if (!text) return alert('暂无结果可使用');
  localStorage.setItem('selected_prompt', text);
  window.location.href = '/';
});
</script>
</body>
</html>
