<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>孔春春AI工坊 - 视频生成</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { primary: "#9333ea" },
      fontFamily: { headline: ["Space Grotesk"], body: ["Inter"] }
    } }
  }
</script>
<style>
  body { background:#f5f5f5; color:#333; font-family:Inter,sans-serif; }
  .ghost-border { border:1px solid rgba(0,0,0,0.08); }
  .glass-panel { background:rgba(255,255,255,0.95); backdrop-filter:blur(24px); }
  .scroll-area::-webkit-scrollbar { width:6px; }
  .scroll-area::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.15); border-radius:3px; }
  .seg { display:inline-flex; background:#f3f4f6; border-radius:9999px; padding:3px; border:1px solid rgba(0,0,0,0.06); }
  .seg button { padding:5px 12px; font-size:12px; font-weight:600; border-radius:9999px; color:#6b7280; transition:all .2s; }
	  .seg button.active { background:linear-gradient(135deg,#9333ea,#a533ff); color:#fff; box-shadow:0 2px 6px rgba(147,51,234,.3); }
	  .video-card { background:#fff; border-radius:1rem; overflow:hidden; border:1px solid rgba(0,0,0,0.08); }
	  .brand-logo { font-family:"Space Grotesk","Microsoft YaHei",sans-serif; font-weight:800; letter-spacing:.02em; background:linear-gradient(135deg,#7c3aed,#ec4899 48%,#06b6d4); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 8px 18px rgba(147,51,234,.18)); }
  .empty-stage {
    background: linear-gradient(135deg, rgba(147,51,234,0.06), rgba(236,72,153,0.06));
    border: 2px dashed rgba(147,51,234,0.2);
  }
  .pulse-dot { width:8px; height:8px; border-radius:50%; background:#9333ea; display:inline-block; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity:0.3 } 50% { opacity:1 } }
</style>
</head>
<body class="overflow-hidden h-screen flex flex-col">

<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-2xl shadow-[0_1px_0_0_rgba(0,0,0,0.1)] h-16 flex justify-between items-center gap-4 px-4 md:px-10">
  <div class="flex items-center gap-6 min-w-0 flex-1">
	    <div class="brand-logo text-xl md:text-2xl shrink-0">孔春春AI工坊</div>
    <nav class="flex min-w-0 flex-1 gap-4 overflow-x-auto whitespace-nowrap font-headline tracking-tight">
	      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/">图像生成</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/analyze">图片反推</a>
	      <a class="text-purple-600 border-b-2 border-purple-600 pb-1 font-bold cursor-pointer">视频生成</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/?tab=history">作品库</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/templates">提示词模板</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/chat?mode=chat">文案生成</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/chat/history?type=chat">文案历史</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/chat/history?type=agent">助手历史</a>
      <a class="text-gray-600 hover:text-gray-900 font-bold cursor-pointer" href="/profile">个人中心</a>
    </nav>
  </div>
  <div class="flex items-center gap-4 shrink-0">
    <span class="text-xs text-gray-500">积分: <span id="user-credits" class="text-purple-600 font-bold">-</span></span>
    <a href="/api/logout" class="text-gray-500 hover:text-purple-600 text-sm flex items-center gap-1">
      <span class="material-symbols-outlined text-[16px]">logout</span> 退出
    </a>
  </div>
</header>

<div class="flex flex-1 pt-16 h-full w-full">
  <!-- 左侧参数 -->
  <aside class="hidden md:flex flex-col fixed left-0 top-16 h-[calc(100vh-64px)] w-80 bg-white border-r border-gray-200 z-40 p-5 gap-4 overflow-y-auto scroll-area">
    <div class="rounded-2xl p-4 ghost-border bg-gradient-to-br from-purple-50 to-pink-50">
      <div class="flex items-center gap-2 mb-1">
        <span class="material-symbols-outlined text-purple-600">movie</span>
        <h3 class="font-headline font-semibold text-gray-800">视频生成参数</h3>
      </div>
      <div class="text-xs text-gray-600">每次生成消耗 <span id="cost-tag" class="text-purple-600 font-bold">100</span> 积分</div>
    </div>

    <div class="rounded-2xl ghost-border bg-white p-4 space-y-3">
      <div>
        <label class="text-xs text-gray-500 block mb-1">模型</label>
        <select id="model-select" class="w-full text-sm bg-white border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-purple-300 text-gray-700">
          <option value="">加载中...</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-gray-500 block mb-1">宽高比</label>
        <div class="seg w-full" id="ratio-group">
          <button data-v="16:9" class="active flex-1">16:9</button>
          <button data-v="9:16" class="flex-1">9:16</button>
          <button data-v="1:1" class="flex-1">1:1</button>
        </div>
      </div>

      <div>
        <label class="text-xs text-gray-500 block mb-1">分辨率</label>
        <div class="seg w-full" id="res-group">
          <button data-v="720p" class="active flex-1">720p</button>
          <button data-v="1080p" class="flex-1">1080p</button>
        </div>
      </div>

      <div>
        <label class="text-xs text-gray-500 block mb-1">时长（秒）</label>
        <div class="seg w-full" id="dur-group">
          <button data-v="5" class="active flex-1">5s</button>
          <button data-v="8" class="flex-1">8s</button>
          <button data-v="10" class="flex-1">10s</button>
        </div>
      </div>

      <label class="flex items-center gap-2 text-xs text-gray-600">
        <input id="audio-toggle" type="checkbox" class="rounded text-purple-600 focus:ring-purple-400"/>
        生成音频
      </label>
    </div>

    <div class="rounded-2xl ghost-border bg-white p-4">
      <h4 class="text-sm font-headline font-semibold text-gray-700 mb-2 flex items-center gap-1">
        <span class="material-symbols-outlined text-pink-500 text-[16px]">image</span>
        首帧图片（可选）
      </h4>
      <input id="image-input" type="file" accept="image/*" class="text-xs text-gray-500 w-full"/>
      <div id="image-preview" class="hidden mt-2">
        <img id="preview-img" class="w-full rounded-lg ghost-border" />
        <button id="clear-image" class="text-xs text-red-500 mt-1 hover:underline">清除</button>
      </div>
    </div>
  </aside>

  <!-- 主区 -->
  <main class="flex-1 ml-0 md:ml-80 flex flex-col bg-white h-full overflow-hidden">
    <div class="px-8 py-4 border-b border-gray-100 flex items-center justify-between">
      <div>
        <h2 class="font-headline text-lg font-semibold text-gray-800">AI 视频生成</h2>
      </div>
      <div class="flex items-center gap-3 text-xs">
        <a href="/?tab=history" class="px-3 py-1.5 rounded-full ghost-border bg-white hover:bg-gray-50 text-gray-600 flex items-center gap-1 no-underline">
          <span class="material-symbols-outlined text-[16px]">history</span>
          历史记录
        </a>
        <span class="flex items-center gap-1">
          <span id="status-dot" class="w-2 h-2 rounded-full bg-green-500"></span>
          <span id="status-text" class="text-gray-500">就绪</span>
        </span>
      </div>
    </div>

    <div id="stage" class="flex-1 overflow-y-auto px-8 py-6 scroll-area">
      <div id="empty-stage" class="empty-stage rounded-2xl h-full min-h-[420px] flex flex-col items-center justify-center text-gray-400">
        <span class="material-symbols-outlined text-6xl text-purple-300 mb-3">smart_display</span>
        <div class="font-medium text-gray-500">输入提示词，开始生成视频</div>
      </div>

      <div id="loading-stage" class="hidden h-full min-h-[420px] flex-col items-center justify-center text-gray-500">
        <div class="relative w-20 h-20 mb-4">
          <div class="absolute inset-0 rounded-full border-4 border-purple-200"></div>
          <div class="absolute inset-0 rounded-full border-4 border-purple-600 border-t-transparent animate-spin"></div>
        </div>
        <div class="font-headline text-base text-gray-700">
          <span class="pulse-dot"></span>
          <span id="loading-msg">正在生成视频...</span>
        </div>
        <div class="text-xs text-gray-400 mt-2">已等待 <span id="elapsed">0</span> 秒</div>
      </div>

      <div id="result-stage" class="hidden">
        <div class="video-card max-w-3xl mx-auto">
          <video id="result-video" controls class="w-full bg-black"></video>
          <div class="p-4 border-t border-gray-100">
            <div id="result-prompt" class="text-sm text-gray-700 mb-2"></div>
            <div class="flex items-center gap-3 text-xs text-gray-500">
              <span id="result-meta"></span>
              <a id="download-link" href="#" download class="ml-auto text-purple-600 hover:underline flex items-center gap-1">
                <span class="material-symbols-outlined text-[14px]">download</span>下载
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 输入区 -->
    <div class="px-8 pb-6 pt-2 border-t border-gray-100">
      <div class="glass-panel rounded-2xl p-4 shadow-lg ghost-border">
        <textarea id="prompt-input" rows="2" placeholder="描述你想生成的视频画面... (Ctrl+Enter 提交)"
          class="w-full bg-transparent border-none text-gray-800 text-sm focus:ring-0 resize-none p-2 placeholder:text-gray-400"></textarea>
        <div class="flex items-center justify-between mt-2">
          <span class="text-xs text-gray-500">消耗 <span id="cost-inline" class="text-purple-600 font-bold">100</span> 积分</span>
          <button id="btn-generate" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2.5 rounded-2xl font-headline font-bold flex items-center gap-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 1;">auto_awesome</span>
            生成视频
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
const btnGen = $('btn-generate');
const promptInput = $('prompt-input');
const stageEmpty = $('empty-stage');
const stageLoading = $('loading-stage');
const stageResult = $('result-stage');
const statusDot = $('status-dot');
const statusText = $('status-text');
const elapsedEl = $('elapsed');
const loadingMsg = $('loading-msg');
const userCreditsEl = $('user-credits');
const headerModel = null;
const modelSelect = $('model-select');
const audioToggle = $('audio-toggle');
const imageInput = $('image-input');
const previewImg = $('preview-img');
const imagePreview = $('image-preview');
const clearImageBtn = $('clear-image');

let currentImageBase64 = null;
let elapsedTimer = null;

// 段控件
function setupSeg(groupId) {
  const group = $(groupId);
  group.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}
setupSeg('ratio-group');
setupSeg('res-group');
setupSeg('dur-group');

function getSegValue(groupId) {
  const a = $(groupId).querySelector('button.active');
  return a ? a.dataset.v : null;
}

function setStage(name) {
  [stageEmpty, stageLoading, stageResult].forEach(el => el.classList.add('hidden'));
  if (name === 'empty') stageEmpty.classList.remove('hidden');
  if (name === 'loading') stageLoading.classList.remove('hidden');
  if (name === 'result') stageResult.classList.remove('hidden');
  // flex 容器需要 display:flex
  if (name === 'loading') stageLoading.style.display = 'flex';
  if (name === 'empty') stageEmpty.style.display = 'flex';
}

async function loadCredits() {
  try {
    const r = await fetch('/api/credits');
    const d = await r.json();
    userCreditsEl.textContent = d.credits ?? '-';
  } catch (e) { userCreditsEl.textContent = 'error'; }
}

async function loadModels() {
  try {
    const r = await fetch('/api/video-models');
    const d = await r.json();
    modelSelect.innerHTML = '';
    (d.models || []).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      if (m.id === d.default) opt.selected = true;
      modelSelect.appendChild(opt);
    });
    headerModel && (headerModel.textContent = modelSelect.value || d.default);
    $('cost-tag').textContent = d.credits_cost;
    $('cost-inline').textContent = d.credits_cost;
    modelSelect.addEventListener('change', () => { headerModel && (headerModel.textContent = modelSelect.value); });
  } catch (e) {
    modelSelect.innerHTML = '<option>加载失败</option>';
  }
}

imageInput.addEventListener('change', () => {
  const f = imageInput.files?.[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    currentImageBase64 = reader.result; // data:image/...;base64,...
    previewImg.src = currentImageBase64;
    imagePreview.classList.remove('hidden');
  };
  reader.readAsDataURL(f);
});

clearImageBtn.addEventListener('click', () => {
  currentImageBase64 = null;
  imageInput.value = '';
  imagePreview.classList.add('hidden');
});

async function generate() {
  const prompt = promptInput.value.trim();
  if (!prompt) {
    alert('请输入提示词');
    return;
  }

  btnGen.disabled = true;
  setStage('loading');
  statusDot.className = 'w-2 h-2 rounded-full bg-yellow-400 animate-pulse';
  statusText.textContent = '生成中';
  loadingMsg.textContent = '正在提交任务...';

  let elapsed = 0;
  if (elapsedTimer) { clearInterval(elapsedTimer); }
  elapsedTimer = setInterval(() => {
    elapsed += 1;
    elapsedEl.textContent = elapsed;
  }, 1000);

  const payload = {
    prompt,
    model: modelSelect.value,
    aspect_ratio: getSegValue('ratio-group'),
    resolution: getSegValue('res-group'),
    duration_seconds: parseInt(getSegValue('dur-group'), 10),
    generate_audio: audioToggle.checked,
    input_image_base64: currentImageBase64 || null,
  };

  try {
    // 1) 提交任务（立即返回 task_id）
    const r = await fetch('/api/generate-video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (!r.ok || !d.success || !d.task_id) {
      throw new Error(d.detail || d.message || '提交失败');
    }
    const taskId = d.task_id;
    loadingMsg.textContent = '已提交，模型生成中...';

    // 2) 轮询 5s 一次，最多等 15 分钟
    const maxWait = 15 * 60;
    while (true) {
      await new Promise(res => setTimeout(res, 5000));
      const tr = await fetch('/api/video-task/' + encodeURIComponent(taskId));
      if (!tr.ok) {
        const td = await tr.json().catch(() => ({}));
        throw new Error(td.detail || `查询失败 HTTP ${tr.status}`);
      }
      const td = await tr.json();
      if (td.stage) loadingMsg.textContent = '生成中：' + td.stage;
      if (td.status === 'done') {
        showResult(td.history_item);
        if (td.remaining_credits != null) userCreditsEl.textContent = td.remaining_credits;
        statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
        statusText.textContent = '完成';
        notifyDone(td.history_item);
        break;
      }
      if (td.status === 'failed') {
        throw new Error(td.error || '生成失败');
      }
      if (td.elapsed > maxWait) {
        throw new Error('超时（15 分钟）：任务可能仍在后台运行，稍后到作品库查看');
      }
    }
  } catch (e) {
    alert('生成失败: ' + e.message);
    setStage('empty');
    statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
    statusText.textContent = '失败';
  } finally {
    btnGen.disabled = false;
    if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
  }
}

function notifyDone(item) {
  // 浏览器通知（用户授权后才会真的弹）
  try {
    if (window.Notification && Notification.permission === 'granted') {
      new Notification('视频生成完成', { body: (item?.prompt || '').slice(0, 80) });
    } else if (window.Notification && Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
  } catch (_) {}
  // 标题闪烁，吸引用户回到 tab
  if (document.hidden) {
    const orig = document.title;
    let on = false;
    const flashId = setInterval(() => {
      on = !on;
      document.title = on ? '✅ 视频已生成' : orig;
    }, 1000);
    const stop = () => {
      clearInterval(flashId);
      document.title = orig;
      document.removeEventListener('visibilitychange', stop);
    };
    document.addEventListener('visibilitychange', stop);
  }
}

function showResult(item) {
  setStage('result');
  $('result-video').src = item.video_path;
  $('result-prompt').textContent = item.prompt;
  $('result-meta').textContent = `${item.model} · ${item.aspect_ratio} · ${item.resolution} · ${item.duration_seconds}s`;
  $('download-link').href = item.video_path;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

btnGen.addEventListener('click', generate);
promptInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); generate(); }
});

// 初始化
setStage('empty');
loadCredits();
loadModels();
</script>
</body></html>
