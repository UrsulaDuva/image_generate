<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>个人中心 - 孔春春AI工坊</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  body { background: #f5f5f5; color: #333; font-family: Inter, sans-serif; }
  .ghost-border { border: 1px solid rgba(0,0,0,0.08); }
  .tab-btn.active { background: #9333ea; color: white; }
	  .tab-btn { transition: all .2s; }
	  .scroll-area::-webkit-scrollbar { width: 6px; }
	  .scroll-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
	  .brand-logo { font-family:"Space Grotesk","Microsoft YaHei",sans-serif; font-weight:800; letter-spacing:.02em; background:linear-gradient(135deg,#7c3aed,#ec4899 48%,#06b6d4); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 8px 18px rgba(147,51,234,.18)); }
</style>
</head>
<body class="min-h-screen">

<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-2xl shadow-[0_1px_0_0_rgba(0,0,0,0.1)] h-16 flex justify-between items-center gap-4 px-4 md:px-10">
  <div class="flex items-center gap-6 min-w-0 flex-1">
    <div class="brand-logo text-xl md:text-2xl shrink-0">孔春春AI工坊</div>
    <nav class="flex min-w-0 flex-1 gap-4 overflow-x-auto whitespace-nowrap font-['Space_Grotesk'] tracking-tight">
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/">图像生成</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/analyze">图片反推</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/video">视频生成</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/?tab=history">作品库</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/templates">提示词模板</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/chat?mode=chat">文案生成</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/chat/history?type=chat">文案历史</a>
	      <a class="text-gray-600 hover:text-gray-900 font-bold" href="/chat/history?type=agent">助手历史</a>
      <a class="text-purple-600 border-b-2 border-purple-600 pb-1 font-bold">个人中心</a>
    </nav>
  </div>
  <a href="/api/logout" class="text-gray-500 hover:text-purple-600 text-sm flex items-center gap-1 shrink-0">
    <span class="material-symbols-outlined text-[16px]">logout</span> 退出
  </a>
</header>

<main class="pt-24 px-10 pb-12 max-w-7xl mx-auto">

  <!-- Header card -->
  <div class="bg-gradient-to-br from-purple-600 to-pink-500 rounded-3xl p-8 text-white shadow-xl mb-8 relative overflow-hidden">
    <div class="absolute -top-10 -right-10 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
    <div class="flex items-center gap-6 relative z-10">
      <div class="w-20 h-20 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center border-2 border-white/30">
        <span class="material-symbols-outlined text-5xl">account_circle</span>
      </div>
      <div class="flex-1">
        <h1 class="text-2xl font-bold font-['Space_Grotesk']" id="username">-</h1>
        <p class="text-white/80 text-sm mt-1">欢迎回来，您的专属创作空间</p>
      </div>
      <div class="text-right">
        <div class="text-xs text-white/70 uppercase tracking-wider">积分余额</div>
        <div class="text-5xl font-bold font-['Space_Grotesk'] mt-1" id="credits">0</div>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-4 mt-8 relative z-10">
      <div class="bg-white/15 backdrop-blur-sm rounded-2xl p-4">
        <div class="text-xs text-white/70">生图次数</div>
        <div class="text-2xl font-bold mt-1" id="stat-image">0</div>
      </div>
      <div class="bg-white/15 backdrop-blur-sm rounded-2xl p-4">
        <div class="text-xs text-white/70">对话数</div>
        <div class="text-2xl font-bold mt-1" id="stat-chat">0</div>
      </div>
      <div class="bg-white/15 backdrop-blur-sm rounded-2xl p-4">
        <div class="text-xs text-white/70">积分变动</div>
        <div class="text-2xl font-bold mt-1" id="stat-ledger">0</div>
      </div>
    </div>
  </div>

  <!-- Features -->
  <section class="mb-8">
    <h2 class="text-xl font-bold text-gray-800 mb-4 font-['Space_Grotesk'] flex items-center gap-2">
      <span class="material-symbols-outlined text-purple-600">apps</span> 支持的功能
    </h2>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4" id="features"></div>
  </section>

  <!-- Tabs -->
  <section class="bg-white rounded-3xl ghost-border p-6 shadow-sm">
    <div class="flex gap-2 mb-6 border-b border-gray-100 pb-3 flex-wrap">
      <button class="tab-btn active px-4 py-2 rounded-xl text-sm font-semibold" data-tab="ledger">积分明细</button>
      <button class="tab-btn px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-tab="image">生图明细</button>
      <button class="tab-btn px-4 py-2 rounded-xl text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200" data-tab="chat">文案明细</button>
    </div>

    <div id="tab-ledger" class="tab-content">
      <div class="overflow-x-auto scroll-area max-h-[520px]">
        <table class="w-full text-sm">
          <thead class="text-xs text-gray-500 sticky top-0 bg-white">
            <tr class="border-b border-gray-100">
              <th class="text-left py-2 px-3">时间</th>
              <th class="text-left py-2 px-3">类型</th>
              <th class="text-right py-2 px-3">变动</th>
              <th class="text-right py-2 px-3">余额</th>
              <th class="text-left py-2 px-3">说明</th>
            </tr>
          </thead>
          <tbody id="ledger-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-image" class="tab-content hidden">
      <div id="image-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-h-[600px] overflow-y-auto scroll-area"></div>
    </div>

    <div id="tab-chat" class="tab-content hidden">
      <div id="chat-list" class="space-y-3 max-h-[600px] overflow-y-auto scroll-area"></div>
    </div>
  </section>
</main>

<script>
const SOURCE_LABELS = {
  generate_image: { label: '图像生成', color: 'bg-pink-100 text-pink-700' },
  approve: { label: '兑换批准', color: 'bg-green-100 text-green-700' },
  admin_grant: { label: '管理员赠予', color: 'bg-purple-100 text-purple-700' },
  generate_chat: { label: '文案生成', color: 'bg-blue-100 text-blue-700' },
};

function escapeHtml(s) { return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function cleanModelName(name) {
  if (!name) return '-';
  return name.replace(/^deepseek\/deepseek-?/i, '').replace(/\s*\(free\)\s*/i, '').replace(/-?free$/i, '').trim() || name;
}

fetch('/api/profile').then(r => r.json()).then(data => {
  document.getElementById('username').textContent = data.username || '-';
  document.getElementById('credits').textContent = data.credits || 0;
  document.getElementById('stat-image').textContent = data.stats.image_count;
  document.getElementById('stat-chat').textContent = data.stats.chat_count;
  document.getElementById('stat-ledger').textContent = data.stats.ledger_count;

  // Features
  document.getElementById('features').innerHTML = (data.features || []).map(f => `
    <a href="${f.url}" class="bg-white ghost-border rounded-2xl p-4 hover:border-purple-400 hover:shadow-lg transition-all group">
      <div class="w-12 h-12 rounded-xl bg-purple-50 flex items-center justify-center text-purple-600 group-hover:bg-purple-600 group-hover:text-white transition-colors">
        <span class="material-symbols-outlined">${f.icon}</span>
      </div>
      <h3 class="font-semibold text-gray-800 mt-3 text-sm">${escapeHtml(f.name)}</h3>
      <p class="text-xs text-gray-500 mt-1 leading-snug">${escapeHtml(f.desc)}</p>
    </a>
  `).join('');

  // 积分明细
  const ledgerBody = document.getElementById('ledger-tbody');
  if (!data.credits_ledger || data.credits_ledger.length === 0) {
    ledgerBody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-gray-400">暂无积分变动记录</td></tr>';
  } else {
    ledgerBody.innerHTML = data.credits_ledger.map(l => {
      const meta = SOURCE_LABELS[l.source] || { label: l.source, color: 'bg-gray-100 text-gray-700' };
      const changeColor = l.change >= 0 ? 'text-green-600' : 'text-red-500';
      const sign = l.change >= 0 ? '+' : '';
      return `<tr class="border-b border-gray-50 hover:bg-gray-50">
        <td class="py-2 px-3 text-gray-500 text-xs whitespace-nowrap">${escapeHtml(l.timestamp)}</td>
        <td class="py-2 px-3"><span class="text-xs px-2 py-0.5 rounded-full ${meta.color}">${escapeHtml(meta.label)}</span></td>
        <td class="py-2 px-3 text-right font-bold ${changeColor}">${sign}${l.change}</td>
        <td class="py-2 px-3 text-right font-mono text-purple-600">${l.balance}</td>
        <td class="py-2 px-3 text-gray-600 text-xs">${escapeHtml(l.detail)}</td>
      </tr>`;
    }).join('');
  }

  // 生图明细
  const imgGrid = document.getElementById('image-grid');
  if (!data.image_records || data.image_records.length === 0) {
    imgGrid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">暂无生图记录</div>';
  } else {
    imgGrid.innerHTML = data.image_records.map(h => `
      <div class="ghost-border rounded-2xl overflow-hidden bg-gray-50">
        <div class="aspect-square bg-gray-100">
          <img src="${escapeHtml(h.image_path)}" class="w-full h-full object-cover" loading="lazy" onerror="this.style.display='none'"/>
        </div>
        <div class="p-3">
          <div class="text-xs text-gray-500 truncate">${escapeHtml(h.prompt || '')}</div>
          <div class="flex items-center justify-between text-[10px] text-gray-400 mt-2">
            <span>${escapeHtml(h.model)}</span>
            <span>${escapeHtml(h.size)}</span>
          </div>
          <div class="text-[10px] text-gray-400 mt-1">${escapeHtml(h.timestamp)}</div>
        </div>
      </div>
    `).join('');
  }

  // 文案明细
  const chatList = document.getElementById('chat-list');
  if (!data.chat_records || data.chat_records.length === 0) {
    chatList.innerHTML = '<div class="text-center py-12 text-gray-400">暂无文案对话记录</div>';
  } else {
    chatList.innerHTML = data.chat_records.map(c => `
	      <a href="/chat?mode=chat&session=${encodeURIComponent(c.id)}" class="block ghost-border rounded-2xl p-4 hover:border-purple-400 hover:bg-purple-50/30 transition-all">
        <div class="flex items-start justify-between gap-3">
          <h4 class="font-semibold text-gray-800 truncate flex-1">${escapeHtml(c.title || '(无标题)')}</h4>
          <span class="text-xs text-gray-400 whitespace-nowrap">${escapeHtml(c.updated_at || '')}</span>
        </div>
        <div class="flex items-center gap-3 mt-2 text-xs text-gray-500">
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">forum</span>${c.msg_count} 条</span>
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">smart_toy</span>${escapeHtml(cleanModelName(c.model))}</span>
        </div>
      </a>
    `).join('');
  }
});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.classList.add('bg-gray-100', 'text-gray-700');
    });
    btn.classList.add('active');
    btn.classList.remove('bg-gray-100', 'text-gray-700');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
  });
});
</script>
</body>
</html>
